name: logistic_elastic_net
description: Elastic-net logistic regression with combined L1 and L2 regularization.
model:
  type: logistic_regression
  penalty: elasticnet
  solver: saga
  C: 1.0
  l1_ratio: 0.5
  class_weight: balanced
  max_iter: 1000
  tol: 0.01
  n_jobs: -1
  random_state: 42
search_grid:
  model__C: [0.1, 0.3, 1.0, 3.0, 10.0]
  model__l1_ratio: [0.1, 0.3, 0.5, 0.7, 0.9]
