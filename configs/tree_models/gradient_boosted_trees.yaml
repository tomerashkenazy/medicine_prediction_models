name: gradient_boosted_trees
description: Gradient boosted decision trees using the shared raw-data preprocessing pipeline.
model:
  type: hist_gradient_boosting_classifier
  max_iter: 150
  learning_rate: 0.05
  max_depth: 3
  min_samples_leaf: 20
  l2_regularization: 0.0
  random_state: 42
fit:
  sample_weight: balanced
