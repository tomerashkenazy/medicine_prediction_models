name: reduced_logistic_elastic_net
description: Reduced elastic-net logistic regression without high-cardinality site or diagnosis code features.
tune: true
feature_reduction: reduced_logistic_no_codes
exclude_features:
  - hospital_id
  - icu_id
  - apache_2_diagnosis
  - apache_3j_diagnosis
model:
  type: logistic_regression
  penalty: elasticnet
  solver: saga
  C: 1.0
  l1_ratio: 0.5
  class_weight: balanced
  max_iter: 1000
  tol: 0.01
  n_jobs: -1
  random_state: 42
search_grid:
  model__C: [0.001, 0.01, 0.1, 1.0, 10.0, 100.0]
  model__l1_ratio: [0.1, 0.3, 0.5, 0.7, 0.9]
  model__class_weight: [null, balanced]
